[*]
; Global settings optimized for code completion
n-gpu-layers = 99
ctx-size = 16384
batch-size = 2048
ubatch-size = 512

[DeepSeek-Coder-6.7B]
; Replace the path below with your actual file location
model = /home/user/models/deepseek-coder-6.7b-instruct.Q4_K_M.gguf

; FIM (Fill-In-the-Middle) is critical for inline suggestions
; llama-server usually detects this automatically for DeepSeek, 
; but explicit cache reuse helps performance
cache-reuse = 256
temp = 0.7
